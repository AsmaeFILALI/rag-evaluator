name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # Job 1: Unit tests, linting, type-checking
  # ---------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest --cov --cov-report=term-missing

      - name: Type check
        run: mypy src/
        continue-on-error: true

  # ---------------------------------------------------------------
  # Job 2: RAG evaluation quality gate (scaffold evaluators)
  #
  # Runs the sample scaffold evaluation against the included
  # synthetic dataset. No Azure credentials needed.
  # Exit code 3 = threshold breach → blocks the PR.
  #
  # To add Azure SDK or LLM judge evaluators, provide credentials
  # via GitHub Secrets and use a config that enables them.
  # ---------------------------------------------------------------
  eval-scaffold:
    name: "RAG Eval — scaffold quality gate"
    runs-on: ubuntu-latest
    needs: test                        # only evaluate if tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install framework
        run: |
          python -m pip install --upgrade pip
          pip install -e "."

      - name: Run scaffold evaluation
        run: rag-eval --config project-configs/sample-rag.yaml

      - name: Upload evaluation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports-scaffold
          path: output/sample-rag/

  # ---------------------------------------------------------------
  # Job 3 (optional): RAG evaluation with Azure SDK evaluators
  #
  # Uncomment and configure secrets to enable Azure-backed eval
  # as a merge gate. Requires:
  #   AZURE_OPENAI_API_KEY  or  az login via OIDC
  #   A project config that uses Azure SDK evaluators
